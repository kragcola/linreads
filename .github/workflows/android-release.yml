name: Android Dev Release

on:
  push:
    branches: [main]

concurrency:
  group: android-dev-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BUILD_TAG: dev-${{ github.run_number }}-${{ github.sha }}
      KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
      STORE_PASSWORD: android
      KEY_ALIAS: androiddebugkey
      KEY_PASSWORD: android
      GITHUB_OTA_TOKEN: ${{ secrets.OTA_READ_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Run Android regression suites
        working-directory: android
        run: ./gradlew -Preadflow.phase=2 test

      - name: Build OTA APK
        working-directory: android
        run: ./gradlew -Preadflow.phase=2 :app:assembleOta

      - name: Publish dev-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "Dev build #${{ github.run_number }}"
          body: |
            ${{ github.event.head_commit.message }}
            
            ---
            BUILD_TAG: ${{ env.BUILD_TAG }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          files: android/app/build/outputs/apk/ota/app-ota.apk
          prerelease: true
          make_latest: false
